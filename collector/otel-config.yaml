receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    send_batch_size: 1000
    timeout: 5s

  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128

exporters:
  kafka/traces:
    protocol_version: "3.0.0"
    brokers:
      - kafka:9092
    topic: autosre.traces
    encoding: otlp_proto

  kafka/metrics:
    protocol_version: "3.0.0"
    brokers:
      - kafka:9092
    topic: autosre.metrics
    encoding: otlp_proto

  kafka/logs:
    protocol_version: "3.0.0"
    brokers:
      - kafka:9092
    topic: autosre.logs
    encoding: otlp_proto

  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [kafka/traces, debug]

    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [kafka/metrics, debug]

    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [kafka/logs, debug]

  telemetry:
    metrics:
      address: 0.0.0.0:8888
